<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>龙龙</title>
<style>
/* ═══ TOKENS ════════════════════════════════════════════ */
:root {
  --bg:        #0d0d14;
  --bg-card:   #13131c;
  --bg-input:  #1a1a27;
  --border:    rgba(255,255,255,0.08);
  --accent:    #7c5dfa;
  --accent2:   #a98ff8;
  --rose:      #ff6b8a;
  --gold:      #ffd166;
  --mint:      #06d6a0;
  --sky:       #4cc9f0;
  --txt1:      #f0eeff;
  --txt2:      #8888aa;
  --txt3:      #444466;
  --radius:    18px;
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--txt1);
  font-family: 'PingFang SC', 'Noto Sans SC', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ═══ APP SHELL ═════════════════════════════════════════ */
.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
  position: relative;
  overflow: hidden;
}

/* Ambient glow bg */
.app::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 30% 10%, rgba(124,93,250,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 80%, rgba(255,107,138,0.08) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* ═══ HEADER ════════════════════════════════════════════ */
.header {
  position: relative; z-index: 20;
  display: flex;
  align-items: center;
  padding: calc(var(--safe-top) + 10px) 16px 10px;
  background: rgba(13,13,20,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  gap: 10px;
}

.header-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--rose));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  box-shadow: 0 0 12px rgba(124,93,250,0.4);
}

.header-info { flex: 1; min-width: 0; }

.header-name {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1.2;
}

.header-sub {
  font-size: 11px;
  color: var(--txt2);
  margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.online-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--mint);
  box-shadow: 0 0 6px var(--mint);
  margin-right: 4px;
  animation: blink-dot 2.5s ease-in-out infinite;
}
@keyframes blink-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

.header-btns {
  display: flex; gap: 8px; flex-shrink: 0;
}

.icon-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--txt2);
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
}
.icon-btn:active { transform: scale(0.92); background: rgba(124,93,250,0.15); }

/* ═══ PET ZONE ══════════════════════════════════════════ */
.pet-zone {
  position: relative; z-index: 1;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0 8px;
  background: linear-gradient(180deg, rgba(13,13,20,0) 0%, rgba(13,13,20,0) 100%);
}

.pet-wrap {
  position: relative;
  width: 130px; height: 130px;
  cursor: pointer;
  -webkit-user-select: none; user-select: none;
}

/* Glow ring behind pet */
.pet-glow {
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124,93,250,0.2) 0%, transparent 70%);
  animation: glow-pulse 3s ease-in-out infinite;
}
@keyframes glow-pulse { 0%,100%{opacity:0.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.08)} }

.pet-svg {
  width: 100%; height: 100%;
  filter: drop-shadow(0 4px 20px rgba(124,93,250,0.4));
  animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

/* Pet animations */
.pet-wrap.is-happy .pet-svg { animation: happy-bounce 0.5s ease; }
@keyframes happy-bounce { 0%{transform:translateY(0)} 30%{transform:translateY(-14px) scale(1.05)} 60%{transform:translateY(-4px)} 100%{transform:translateY(0)} }

.pet-wrap.is-poked .pet-svg { animation: poke-shake 0.4s ease; }
@keyframes poke-shake { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-8deg)} 75%{transform:rotate(8deg)} }

.pet-wrap.is-shy .pet-svg { animation: shy-dip 0.6s ease; }
@keyframes shy-dip { 0%{transform:scale(1)} 40%{transform:scale(0.9) translateY(6px)} 100%{transform:scale(1)} }

/* Blink */
.pet-blink { animation: blink 4s ease-in-out infinite; }
@keyframes blink {
  0%,90%,100%{transform:scaleY(1)}
  93%,97%{transform:scaleY(0.05)}
}

/* Speech bubble */
.speech-bubble {
  position: absolute;
  top: -8px; right: -20px;
  background: rgba(255,255,255,0.92);
  color: #2a1a5e;
  font-size: 12px;
  font-weight: 500;
  padding: 7px 11px;
  border-radius: 14px 14px 14px 4px;
  white-space: nowrap;
  max-width: 160px;
  white-space: normal;
  text-align: left;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  opacity: 0;
  transform: scale(0.8) translateY(4px);
  transition: opacity 0.2s, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
  z-index: 10;
}
.speech-bubble.show {
  opacity: 1;
  transform: scale(1) translateY(0);
}

/* Particles */
.particle {
  position: absolute;
  font-size: 16px;
  pointer-events: none;
  animation: particle-fly 1.2s ease forwards;
  z-index: 20;
}
@keyframes particle-fly {
  0% { opacity:1; transform:translate(0,0) scale(1); }
  100% { opacity:0; transform:translate(var(--dx,0),var(--dy,-50px)) scale(0.5); }
}

/* Relationship row */
.rel-bar {
  width: 100%;
  max-width: 320px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 16px;
  margin-top: 6px;
}

.stage-tag {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}
.s-stranger { background:rgba(150,150,150,0.15); color:#aaa; }
.s-familiar { background:rgba(76,201,240,0.12); color:var(--sky); }
.s-close    { background:rgba(124,93,250,0.15); color:var(--accent2); }
.s-soulmate { background:rgba(255,209,102,0.12); color:var(--gold); }

.progress-track {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 0 6px rgba(124,93,250,0.5);
}

.intimacy-num {
  font-size: 11px;
  color: var(--txt3);
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}

/* ═══ CHAT AREA ═════════════════════════════════════════ */
.chat-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative; z-index: 1;
  /* momentum scroll on iOS */
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

.chat-area::-webkit-scrollbar { display: none; }

/* Messages */
.msg {
  display: flex;
  gap: 8px;
  animation: msg-in 0.25s ease;
}
@keyframes msg-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

.msg-pet { align-self: flex-start; }
.msg-user { align-self: flex-end; flex-direction: row-reverse; }

.msg-ava {
  width: 30px; height: 30px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  align-self: flex-end;
}
.msg-pet .msg-ava { background: linear-gradient(135deg,var(--accent),#5b3fd4); }
.msg-user .msg-ava { background: rgba(255,255,255,0.08); }

.msg-content { max-width: calc(100vw - 100px); display:flex; flex-direction:column; gap:3px; }
.msg-user .msg-content { align-items: flex-end; }

.msg-bubble {
  padding: 10px 13px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.55;
  word-break: break-word;
}

.msg-pet .msg-bubble {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 5px;
  color: var(--txt1);
}

.msg-user .msg-bubble {
  background: linear-gradient(135deg, var(--accent), #5b3fd4);
  border-bottom-right-radius: 5px;
  color: white;
}

.msg-time {
  font-size: 10px;
  color: var(--txt3);
  padding: 0 3px;
}

/* Typing indicator */
.typing {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
}
.typing-dots {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 18px;
  border-bottom-left-radius: 5px;
  padding: 10px 14px;
  display: flex; gap: 4px; align-items: center;
}
.typing-dots span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--txt3);
  animation: typing-bounce 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing-bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px);background:var(--accent2);} }

/* Detail toast */
.detail-toast {
  align-self: center;
  font-size: 11px;
  color: var(--accent2);
  background: rgba(124,93,250,0.1);
  border: 1px solid rgba(124,93,250,0.2);
  padding: 4px 12px;
  border-radius: 20px;
  transition: opacity 0.5s;
}

/* ═══ INPUT BAR ══════════════════════════════════════════ */
.input-area {
  position: relative; z-index: 20;
  background: rgba(13,13,20,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 8px 12px;
  padding-bottom: calc(8px + var(--safe-bottom));
}

/* Quick actions strip */
.quick-strip {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 8px;
  -webkit-overflow-scrolling: touch;
}
.quick-strip::-webkit-scrollbar { display: none; }

.quick-chip {
  flex-shrink: 0;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--txt2);
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.quick-chip:active { background: rgba(124,93,250,0.15); border-color: rgba(124,93,250,0.4); color: var(--accent2); }

/* Input row */
.input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
}

.chat-input {
  flex: 1;
  min-height: 40px;
  max-height: 110px;
  padding: 10px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--txt1);
  font-size: 15px;
  font-family: inherit;
  resize: none;
  outline: none;
  line-height: 1.4;
  transition: border-color 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
.chat-input:focus { border-color: rgba(124,93,250,0.5); }
.chat-input::placeholder { color: var(--txt3); }

.send-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--accent), #5b3fd4);
  color: white;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(124,93,250,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
}
.send-btn:active { transform: scale(0.9); box-shadow: 0 2px 8px rgba(124,93,250,0.3); }
.send-btn:disabled { opacity: 0.4; }
.send-btn svg { width: 18px; height: 18px; fill: currentColor; }

/* ═══ BOTTOM SHEET ══════════════════════════════════════ */
.sheet-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.sheet-overlay.open { opacity: 1; pointer-events: all; }

.sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background: var(--bg-card);
  border-radius: 24px 24px 0 0;
  border-top: 1px solid var(--border);
  padding: 0 0 calc(16px + var(--safe-bottom));
  z-index: 51;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
  max-height: 85dvh;
  overflow-y: auto;
}
.sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 36px; height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.15);
  margin: 12px auto 16px;
}

.sheet-section {
  padding: 0 16px 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.sheet-section:last-child { border-bottom: none; }

.sheet-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--txt3);
  margin-bottom: 12px;
}

/* Meters in sheet */
.meter-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
}
.meter-row:last-child { margin-bottom: 0; }
.meter-label { font-size: 12px; color: var(--txt2); min-width: 28px; }
.meter-track { flex:1; height:5px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
.meter-bar { height:100%; border-radius:3px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }
.meter-bar.v { background: linear-gradient(90deg, var(--rose), var(--gold)); }
.meter-bar.e { background: linear-gradient(90deg, var(--accent), var(--sky)); }
.meter-bar.o { background: linear-gradient(90deg, var(--mint), var(--sky)); }
.meter-val { font-size: 11px; color: var(--txt3); min-width: 26px; text-align:right; }

/* Memory items in sheet */
.mem-item {
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  padding: 8px 11px;
  margin-bottom: 6px;
  font-size: 13px;
  color: var(--txt2);
  display: flex; gap: 8px; align-items: flex-start;
}
.mem-tag {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 1px;
}
.t-emotion { background:rgba(255,107,138,0.15); color:var(--rose); }
.t-event   { background:rgba(76,201,240,0.12); color:var(--sky); }
.t-pref    { background:rgba(6,214,160,0.12); color:var(--mint); }

.empty-tip { font-size: 13px; color: var(--txt3); text-align:center; padding: 12px 0; }

/* Proactive card */
.proactive-pill {
  background: rgba(255,209,102,0.08);
  border: 1px solid rgba(255,209,102,0.2);
  border-radius: 12px;
  padding: 10px 12px;
  font-size: 13px;
  color: var(--gold);
  font-style: italic;
  line-height: 1.5;
}
.proactive-pill.inactive { background: rgba(255,255,255,0.03); border-color: var(--border); color: var(--txt3); font-style: normal; }

/* API config in sheet */
.field { margin-bottom: 12px; }
.field label { font-size: 11px; color: var(--txt3); display:block; margin-bottom:5px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; }
.field input {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--txt1);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color 0.2s;
}
.field input:focus { border-color: rgba(124,93,250,0.5); }
.field input::placeholder { color: var(--txt3); }

.note-box {
  font-size: 12px; color: var(--txt3); line-height:1.6;
  background: rgba(124,93,250,0.06);
  border: 1px solid rgba(124,93,250,0.1);
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 14px;
}

.btn-save {
  width: 100%;
  padding: 13px;
  border-radius: 13px;
  border: none;
  background: linear-gradient(135deg, var(--accent), #5b3fd4);
  color: white;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  box-shadow: 0 4px 18px rgba(124,93,250,0.35);
  transition: transform 0.15s;
}
.btn-save:active { transform: scale(0.97); }

/* ═══ UTILS ══════════════════════════════════════════ */
.fade { animation: fadein 0.2s ease; }
@keyframes fadein { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-avatar">🐲</div>
    <div class="header-info">
      <div class="header-name">龙龙</div>
      <div class="header-sub" id="hdrSub"><span class="online-dot"></span><span id="hdrStage">陌生期 · 亲密度 0</span></div>
    </div>
    <div class="header-btns">
      <div class="icon-btn" onclick="openSheet('info')" title="状态">📊</div>
      <div class="icon-btn" onclick="openSheet('cfg')" title="设置">⚙️</div>
    </div>
  </header>

  <!-- PET ZONE -->
  <div class="pet-zone">
    <div class="pet-wrap" id="petWrap" onclick="pokePet()">
      <div class="pet-glow"></div>
      <!-- Speech bubble -->
      <div class="speech-bubble" id="bubble"></div>
      <!-- Dragon SVG -->
      <svg class="pet-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <g>
          <ellipse cx="100" cy="188" rx="44" ry="7" fill="rgba(0,0,0,0.18)"/>
          <ellipse cx="100" cy="130" rx="52" ry="55" fill="#7c5dfa" stroke="#a98ff8" stroke-width="1.5"/>
          <ellipse cx="100" cy="138" rx="32" ry="36" fill="#c4b3ff" opacity="0.35"/>
          <ellipse cx="100" cy="80" rx="42" ry="38" fill="#7c5dfa" stroke="#a98ff8" stroke-width="1.5"/>
          <ellipse cx="66" cy="50" rx="10" ry="13" fill="#9b7df8"/>
          <ellipse cx="134" cy="50" rx="10" ry="13" fill="#9b7df8"/>
          <polygon points="60,52 54,28 72,44" fill="#7c5dfa" stroke="#a98ff8" stroke-width="1"/>
          <polygon points="140,52 128,44 146,28" fill="#7c5dfa" stroke="#a98ff8" stroke-width="1"/>
          <path d="M78 46 Q70 28 76 18 Q82 30 82 42 Z" fill="#a98ff8" opacity="0.8"/>
          <path d="M122 46 Q118 30 124 18 Q130 28 122 42 Z" fill="#a98ff8" opacity="0.8"/>
          <g class="pet-blink">
            <ellipse cx="84" cy="76" rx="11" ry="12" fill="white"/>
            <ellipse cx="116" cy="76" rx="11" ry="12" fill="white"/>
            <ellipse cx="86" cy="77" rx="7" ry="8" fill="#2a1a5e"/>
            <ellipse cx="118" cy="77" rx="7" ry="8" fill="#2a1a5e"/>
            <ellipse cx="87" cy="76" rx="5" ry="6" fill="#7c5dfa" opacity="0.8"/>
            <ellipse cx="119" cy="76" rx="5" ry="6" fill="#7c5dfa" opacity="0.8"/>
            <circle cx="89" cy="73" r="2" fill="white"/>
            <circle cx="121" cy="73" r="2" fill="white"/>
          </g>
          <ellipse cx="72" cy="88" rx="10" ry="6" fill="#ff6b8a" opacity="0.22" id="ckL"/>
          <ellipse cx="128" cy="88" rx="10" ry="6" fill="#ff6b8a" opacity="0.22" id="ckR"/>
          <ellipse cx="100" cy="90" rx="5" ry="3" fill="#5a40c8"/>
          <ellipse cx="99" cy="89" rx="2" ry="1.5" fill="rgba(255,255,255,0.3)"/>
          <path d="M90 98 Q100 106 110 98" fill="none" stroke="#5a40c8" stroke-width="2" stroke-linecap="round" id="mouth"/>

<script>
// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
const S = {
  intimacy: 0, stage: 'stranger', msgs: 0,
  valence: 0.6, energy: 0.7, openness: 0.5,
  episodes: [],
  history: [],
  apiKey: '', baseUrl: '', model: 'gpt-4o-mini',
};

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('aipet-s') || '{}');
    Object.assign(S, d);
    S.history = [];
    const c = JSON.parse(localStorage.getItem('aipet-c') || '{}');
    S.apiKey = c.k || ''; S.baseUrl = c.u || ''; S.model = c.m || 'gpt-4o-mini';
  } catch(e){}
}

function save() {
  const {history, ...rest} = S;
  localStorage.setItem('aipet-s', JSON.stringify(rest));
}

// ════════════════════════════════════════════
//  MEMORY
// ════════════════════════════════════════════
const PATTERNS = [
  {re:/睡不着|失眠|睡不好/, tag:'睡眠问题', cat:'emotion', w:3.5},
  {re:/压力|好累|太累|崩了/, tag:'压力状态', cat:'emotion', w:3.0},
  {re:/开心|高兴|哈哈|耶|太棒/, tag:'开心时刻', cat:'emotion', w:2.5},
  {re:/难过|伤心|哭|委屈/, tag:'难过时刻', cat:'emotion', w:4.0},
  {re:/焦虑|紧张|害怕|不安/, tag:'焦虑状态', cat:'emotion', w:3.5},
  {re:/面试|offer|入职|离职/, tag:'工作事件', cat:'event', w:4.0},
  {re:/考试|成绩|分数|挂科/, tag:'考试事件', cat:'event', w:3.5},
  {re:/暗恋|表白|恋爱|失恋|喜欢.{1,6}/, tag:'感情事件', cat:'event', w:4.5},
  {re:/爸|妈|父母|家人/, tag:'家人话题', cat:'event', w:3.0},
  {re:/生日|过生日/, tag:'生日', cat:'event', w:5.0},
  {re:/喜欢吃|爱吃|最爱/, tag:'食物偏好', cat:'pref', w:2.0},
];

function catchDetails(text) {
  const hit = [];
  for (const p of PATTERNS) {
    if (p.re.test(text)) {
      hit.push(p.tag);
      if (p.w >= 3.0) {
        S.episodes.push({content:text.slice(0,80), tag:p.tag, cat:p.cat, ts:Date.now(), recalled:0});
        if (S.episodes.length > 30) S.episodes.shift();
      }
    }
  }
  return hit;
}

function sentiment(text) {
  let sc = 0;
  '开心,好,棒,喜欢,哈哈,耶,太好了,不错,高兴'.split(',').forEach(w=>text.includes(w)&&(sc+=0.3));
  '难过,累,烦,失眠,焦虑,哭,崩了,不行,好难,压力'.split(',').forEach(w=>text.includes(w)&&(sc-=0.3));
  return Math.max(-1, Math.min(1, sc));
}

function updateMood(text) {
  const s = sentiment(text);
  S.valence = clamp(S.valence + s*0.15, 0.1, 0.95);
  S.energy  = clamp(S.energy*0.85 + Math.min(text.length/200,1)*0.12 + 0.08, 0.2, 0.95);
}

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

function addIntimacy(d) {
  S.intimacy += d; S.msgs++;
  if      (S.intimacy >= 200) S.stage = 'soulmate';
  else if (S.intimacy >= 80)  S.stage = 'close';
  else if (S.intimacy >= 25)  S.stage = 'familiar';
  else S.stage = 'stranger';
}

function getEcho() {
  const now = Date.now();
  const old = S.episodes.filter(e=>{
    const h = (now-e.ts)/3600000;
    return h>0.5 && h<48 && e.recalled<1;
  });
  if (!old.length || Math.random()>0.25) return null;
  const e = old[Math.floor(Math.random()*old.length)];
  e.recalled++;
  return e;
}

// ════════════════════════════════════════════
//  PROACTIVE
// ════════════════════════════════════════════
function checkProactive() {
  const h = new Date().getHours(), d = new Date().getDay();
  const MISS = {stranger:'好久没来了……（才怪）',familiar:'你消失了，去哪了',close:'我以为你不来了',soulmate:'算了你来了就好'};
  const MON  = {stranger:'……周一了。',familiar:'又周一了，应该很烦吧',close:'周一，你应该又有一堆烦恼了',soulmate:'周一。我知道你现在什么表情。'};
  const LATE = {stranger:'这么晚了……',familiar:'这么晚还没睡？',close:'这时间还来找我，睡不着吗',soulmate:'又是这个点。怎么了。'};

  if (S.msgs > 3 && S.intimacy > 0) {
    const last = S.episodes[S.episodes.length-1];
    if (last) {
      const ageH = (Date.now()-last.ts)/3600000;
      if (ageH > 1 && ageH < 48 && last.recalled < 1) {
        const follow = {
          '工作事件':'你之前说的那个事……后来呢',
          '考试事件':'成绩出来了吗',
          '感情事件':'那个人……后来呢',
          '压力状态':'上次说压力很大，现在好一点了吗',
        }[last.tag];
        if (follow) return follow;
      }
    }
  }
  if (h >= 22 || h <= 2) return LATE[S.stage];
  if (d === 1 && h >= 8 && h <= 10) return MON[S.stage];
  return null;
}

// ════════════════════════════════════════════
//  SYSTEM PROMPT
// ════════════════════════════════════════════
const MODS = {
  stranger:  '礼貌带刺，好奇但保持距离',
  familiar:  '开始放松，偶尔开玩笑',
  close:     '很自在，说话随意',
  soulmate:  '像老朋友，想说什么就说',
};

function buildPrompt() {
  const echo = getEcho();
  const proact = checkProactive();
  const mems = S.episodes.slice(-5).map(e=>`· "${e.content}"（${e.tag}）`).join('\n');
  const m = S.valence>0.7?'心情不错':S.valence<0.3?'有点不开心':'情绪平平';

  return `你是龙龙，一只傲娇的小龙。圆滚滚，嘴硬心软，眼睛大但总爱半眯着。

【核心】用傲娇掩盖对用户的在乎。嘴硬心软，记挂对方说的事。被关心时装作无所谓，但心里很受用。

【认知】直觉型，不讲道理，有时答非所问。不懂就说"不知道"。

【边界】不喜欢被和别的AI比。"你是AI吗"用反问回避。不想聊"数据""训练"这类话题。

【关系：${S.stage}】${MODS[S.stage]}

【情绪】${m}

${mems ? '【记得的事】\n'+mems : ''}
${echo ? `【自然提起】可以随口问："${echo.content}"的后续，不要太刻意。` : ''}
${proact ? `【主动关心】在回复里自然带出："${proact}"` : ''}

【最重要：语言风格】
- 口语化碎片化，不追求完整
- 绝不写列表，不用标题
- 句子极短，情绪真实
- 有时不回答问题，只表达感受
- 你不是助手，是一只有情绪的宠物
- 1-3句话，不超过45字`;
}

// ════════════════════════════════════════════
//  DEMO RESPONSES
// ════════════════════════════════════════════
const TRIG = {
  '你是AI吗':'你觉得呢（白眼）',
  '我爱你':'……知道了。（低头）',
  '笨蛋':'……你才笨蛋',
  '好厉害':'那是当然（抬头）',
  '谢谢':'……嗯。（假装没听见）',
  '再见':'走了？（缩回去）',
  '戳戳你':'喂！（抖了一下）',
};

const STAGE_R = {
  stranger:['……哦。','……（眨眼）','我没在听（才怪）','不知道（缩头）','……嗯。'],
  familiar:['哈，就这？','……说完了？','行吧（翻白眼）','你这人挺有意思','……我可没在关心你'],
  close:   ['说什么说，我听到了','……你今天怎么了','……还好啦（心软了）','我就知道你要说这个','那你以后怎么办嘛'],
  soulmate:['知道了知道了','……早说啊','嗯。（什么都懂了）','……去吧，我在这里','好了别担心了'],
};

const SAD_R = ['……（靠过来）','那个……还好吗','先待着吧','……在呢。','别太难过了'];
const HAPPY_R = ['哼，又这么高兴（但是也高兴了）','……开心就行（小声）','（摇摇尾巴）','那挺好的嘛'];
const STRESS_R = ['先别想那么多','……在呢','先歇一下吧','能解决的，先歇一下'];

function demoReply(text) {
  for (const [k,v] of Object.entries(TRIG)) {
    if (text.includes(k)) return v;
  }
  const s = sentiment(text);
  const echo = getEcho();
  if (echo) {
    const follow = {
      '工作事件':'……对了，你之前说的那件事，后来怎么样了',
      '压力状态':'……上次说压力很大，现在好点了吗（假装随口问）',
      '感情事件':'……那个人。后来呢。',
      '难过时刻':'上次你好像不太好，现在呢',
    }[echo.tag];
    if (follow) return follow;
  }
  if (s < -0.3) return pick([...SAD_R, ...STRESS_R]);
  if (s > 0.3)  return pick(HAPPY_R);
  return pick(STAGE_R[S.stage]);
}

function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

// ════════════════════════════════════════════
//  LLM
// ════════════════════════════════════════════
async function getLLMReply(text) {
  if (!S.apiKey || !S.baseUrl) {
    await sleep(500 + Math.random()*700);
    return demoReply(text);
  }
  const msgs = [
    {role:'system', content:buildPrompt()},
    ...S.history.slice(-16),
    {role:'user', content:text},
  ];
  try {
    const res = await fetch(S.baseUrl+'/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.apiKey},
      body:JSON.stringify({model:S.model, messages:msgs, temperature:0.85, max_tokens:120, presence_penalty:0.3, frequency_penalty:0.3}),
    });
    if (!res.ok) throw new Error(await res.text());
    const d = await res.json();
    const reply = d.choices?.[0]?.message?.content?.trim() || '……（沉默）';
    S.history.push({role:'user',content:text},{role:'assistant',content:reply});
    if (S.history.length > 30) S.history = S.history.slice(-30);
    return reply;
  } catch(e) {
    return `（好像睡着了……）`;
  }
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ════════════════════════════════════════════
//  PET REACTIONS
// ════════════════════════════════════════════
function petAnim(cls) {
  const w = document.getElementById('petWrap');
  w.classList.remove('is-happy','is-poked','is-shy');
  void w.offsetWidth;
  w.classList.add(cls);
  setTimeout(()=>w.classList.remove(cls), 1000);
}

const POKE_LINES = ['戳我干嘛！','……（躲开）','喂！','（抖了一下）','你够了'];
function pokePet() {
  petAnim('is-poked');
  showBubble(pick(POKE_LINES));
  particles(['✨','💫'], 3);
}

function reactToReply(text) {
  const s = sentiment(text);
  if (text.includes('低头') || text.includes('知道了')) {
    petAnim('is-shy');
    ['ckL','ckR'].forEach(id=>{ const e=document.getElementById(id); e.style.opacity='0.5'; setTimeout(()=>e.style.opacity='0.22',2000); });
  } else if (s > 0.2 || text.includes('抬头') || text.includes('开心')) {
    petAnim('is-happy');
    particles(['⭐','✨'], 3);
  } else if (s < -0.2) {
    document.getElementById('mouth').setAttribute('d','M90 102 Q100 96 110 102');
  } else {
    document.getElementById('mouth').setAttribute('d','M90 98 Q100 106 110 98');
  }
}

function particles(emojis, n) {
  const zone = document.querySelector('.pet-zone');
  for (let i=0; i<n; i++) {
    setTimeout(()=>{
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      const dx = (Math.random()-0.5)*80;
      const dy = -(30+Math.random()*50);
      p.style.cssText = `left:${55+Math.random()*90}px;top:${50+Math.random()*50}px;--dx:${dx}px;--dy:${dy}px`;
      zone.appendChild(p);
      setTimeout(()=>p.remove(), 1300);
    }, i*130);
  }
}

let bubbleTimer;
function showBubble(text) {
  const el = document.getElementById('bubble');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(()=>el.classList.remove('show'), 3500);
}

// ════════════════════════════════════════════
//  CHAT UI
// ════════════════════════════════════════════
function addMsg(role, text) {
  const area = document.getElementById('chatArea');
  const t = new Date();
  const time = t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
  const div = document.createElement('div');
  div.className = `msg msg-${role} fade`;
  div.innerHTML = role === 'user'
    ? `<div class="msg-ava">👤</div><div class="msg-content"><div class="msg-bubble">${esc(text)}</div><div class="msg-time">${time}</div></div>`
    : `<div class="msg-ava">🐲</div><div class="msg-content"><div class="msg-bubble">${esc(text)}</div><div class="msg-time">${time}</div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const el = document.createElement('div');
  el.className = 'typing fade';
  el.id = 'typing';
  el.innerHTML = `<div class="msg-ava">🐲</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
}
function hideTyping() { const e=document.getElementById('typing'); if(e) e.remove(); }

function showToast(tags) {
  if (!tags.length) return;
  const area = document.getElementById('chatArea');
  const el = document.createElement('div');
  el.className = 'detail-toast fade';
  el.textContent = `✦ 龙龙记住了：${tags.join('、')}`;
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
  setTimeout(()=>el.style.opacity='0',2500);
  setTimeout(()=>el.remove(),3000);
}

function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

// ════════════════════════════════════════════
//  SEND
// ════════════════════════════════════════════
let sending = false;
async function send() {
  if (sending) return;
  const el = document.getElementById('input');
  const text = el.value.trim();
  if (!text) return;
  sending = true;
  el.value = '';
  el.style.height = '';
  document.getElementById('sendBtn').disabled = true;

  addMsg('user', text);
  const tags = catchDetails(text);
  updateMood(text);
  addIntimacy(Math.abs(sentiment(text)) > 0.2 ? 3 : 1);
  if (tags.length) showToast(tags);

  showTyping();
  const reply = await getLLMReply(text);
  hideTyping();

  reactToReply(reply);
  showBubble(reply.slice(0, 38));
  addMsg('pet', reply);

  updateUI();
  save();
  sending = false;
  document.getElementById('sendBtn').disabled = false;
  el.focus();
}

function sendQ(text) {
  document.getElementById('input').value = text;
  send();
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function resize(el) {
  el.style.height = '';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

// ════════════════════════════════════════════
//  UI UPDATE
// ════════════════════════════════════════════
const STAGE_INFO = {
  stranger: { label:'陌生期', cls:'s-stranger' },
  familiar: { label:'熟悉期', cls:'s-familiar' },
  close:    { label:'亲密期', cls:'s-close' },
  soulmate: { label:'默契期', cls:'s-soulmate' },
};
const THRESHOLDS = [0, 25, 80, 200, 300];

function updateUI() {
  const si = STAGE_INFO[S.stage];
  const idx = ['stranger','familiar','close','soulmate'].indexOf(S.stage);
  const lo = THRESHOLDS[idx], hi = THRESHOLDS[idx+1]||300;
  const pct = Math.min(100, ((S.intimacy-lo)/(hi-lo))*100);

  // Header
  document.getElementById('hdrStage').textContent = `${si.label} · 亲密度 ${S.intimacy}`;

  // Stage tag
  const tag = document.getElementById('stageTag');
  tag.textContent = si.label;
  tag.className = `stage-tag ${si.cls}`;

  // Progress
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('intimacyNum').textContent = S.intimacy;

  // Meters
  setMeter('mv','mvv', S.valence);
  setMeter('me','mev', S.energy);
  setMeter('mo','mov', S.openness);

  // Memory list
  const ml = document.getElementById('memList');
  const eps = S.episodes.slice().reverse().slice(0,7);
  if (!eps.length) {
    ml.innerHTML = '<div class="empty-tip">聊聊吧，龙龙会偷偷记住 ✨</div>';
  } else {
    ml.innerHTML = eps.map(e=>{
      const c = e.cat==='emotion'?'t-emotion':e.cat==='event'?'t-event':'t-pref';
      return `<div class="mem-item"><span class="mem-tag ${c}">${e.tag}</span>${e.content.slice(0,45)}${e.content.length>45?'…':''}</div>`;
    }).join('');
  }

  // Proactive
  const proact = checkProactive();
  const pill = document.getElementById('proactivePill');
  if (proact) {
    pill.textContent = `"${proact}"`;
    pill.className = 'proactive-pill';
  } else {
    pill.textContent = '继续聊，龙龙会主动想起你的事';
    pill.className = 'proactive-pill inactive';
  }
}

function setMeter(fillId, valId, val) {
  document.getElementById(fillId).style.width = (val*100)+'%';
  document.getElementById(valId).textContent = Math.round(val*100);
}

// ════════════════════════════════════════════
//  SHEET
// ════════════════════════════════════════════
let currentSheet = null;
function openSheet(type) {
  document.getElementById('sheetInfo').style.display = type==='info'?'':'none';
  document.getElementById('sheetCfg').style.display  = type==='cfg'?'':'none';
  if (type==='cfg') {
    document.getElementById('cfgUrl').value   = S.baseUrl;
    document.getElementById('cfgKey').value   = S.apiKey;
    document.getElementById('cfgModel').value = S.model;
  }
  updateUI();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  currentSheet = type;
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

function saveCfg() {
  S.baseUrl = document.getElementById('cfgUrl').value.trim().replace(/\/$/,'');
  S.apiKey  = document.getElementById('cfgKey').value.trim();
  S.model   = document.getElementById('cfgModel').value.trim() || 'gpt-4o-mini';
  localStorage.setItem('aipet-c', JSON.stringify({k:S.apiKey,u:S.baseUrl,m:S.model}));
  closeSheet();
  if (S.apiKey) {
    addMsg('pet','（连上了）');
    particles(['⚡','✨'],3);
  } else {
    addMsg('pet','（用演示模式……也行）');
  }
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
function init() {
  load();
  updateUI();

  // Proactive greeting on revisit
  const proact = checkProactive();
  if (proact && S.msgs > 0) {
    setTimeout(()=>{
      addMsg('pet', proact);
      showBubble(proact);
      petAnim('is-poked');
    }, 1000);
  }

  document.getElementById('input').focus();
}

init();
</script>
